# =========================================================
# Phase 18 — nginx production config.
# =========================================================
# Responsibilities:
#   - SSL termination (Let's Encrypt certs mounted at /etc/letsencrypt)
#   - HTTP → HTTPS redirect (incl. ACME challenge at /.well-known/*)
#   - Reverse proxy: / → frontend:3000, /api/ → backend:4000
#   - Per-route rate limiting: 10 r/m on /auth/, 30 r/m on /api/
#   - SSE pass-through on /api/v1/ai/chat (no buffering)
#   - Gzip + static cache headers
#   - Liveness probe at /healthz for Docker compose
#
# Server names — update for your real domain:
#   nextgenlms.com.vn  (primary)
#   www.nextgenlms.com.vn  (redirected to apex)
# =========================================================

user  nginx;
worker_processes auto;

events {
  worker_connections 2048;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ----- Logging -----
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # ----- Performance / hardening -----
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;
  client_max_body_size 200m;  # WebGL / SCORM uploads
  client_body_timeout 120s;
  proxy_read_timeout 300s;    # allow slow SSR + long SSE streams

  # ----- Gzip -----
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_vary on;
  gzip_types application/atom+xml
             application/javascript
             application/json
             application/ld+json
             application/manifest+json
             application/rss+xml
             application/vnd.geo+json
             application/vnd.ms-fontobject
             application/x-font-ttf
             application/x-web-app-manifest+json
             application/xhtml+xml
             application/xml
             font/opentype
             image/bmp
             image/svg+xml
             image/x-icon
             text/cache-manifest
             text/css
             text/plain
             text/vcard
             text/vnd.rim.location.xloc
             text/vtt
             text/x-component
             text/x-cross-domain-policy;

  # ----- Security headers -----
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "interest-cohort=()" always;

  # ----- Rate limiting zones -----
  # /auth/ gets the strictest bucket (brute-force defence complements
  # the app-level per-email counter). /api/ is softer because students
  # genuinely load dozens of endpoints per lesson view.
  # Per-IP rate limits. auth_zone: strict (brute-force prevention). api_zone:
  # loose (the admin dashboard alone fires ~10 parallel widget calls).
  # 10r/s = 600r/m — still well under scraper-level abuse, well over UI usage.
  limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;

  # ----- Upstreams -----
  upstream backend_upstream {
    server backend:4000;
    keepalive 32;
  }
  upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
  }

  # =====================================================
  # HTTP → HTTPS redirect + ACME challenge passthrough.
  # =====================================================
  server {
    listen 80 default_server;
    server_name _;

    # Let's Encrypt webroot challenge.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Liveness for docker-compose healthcheck — answered on :80.
    location = /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # =====================================================
  # HTTPS main server.
  # =====================================================
  server {
    listen 443 ssl http2;
    server_name nextgenlms.com.vn www.nextgenlms.com.vn;

    ssl_certificate     /etc/letsencrypt/live/nextgenlms.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextgenlms.com.vn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------------------------------
    # /api/v1/auth/* — strict rate limit (10 r/min).
    # Matched BEFORE the generic /api/ block below.
    # -------------------------------------------------
    location ~ ^/api/v1/auth/ {
      limit_req zone=auth_zone burst=5 nodelay;
      limit_req_status 429;

      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";
    }

    # -------------------------------------------------
    # /api/v1/ai/chat — SSE stream, must NOT buffer.
    # -------------------------------------------------
    location ~ ^/api/v1/ai/(chat|stream) {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_cache off;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";
      proxy_read_timeout 300s;
      chunked_transfer_encoding on;
    }

    # -------------------------------------------------
    # /socket.io/* — websocket upgrade.
    # -------------------------------------------------
    location /socket.io/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }

    # -------------------------------------------------
    # /api/* — general backend routes, softer limit.
    # -------------------------------------------------
    location /api/ {
      limit_req zone=api_zone burst=50 nodelay;
      limit_req_status 429;

      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";
    }

    # -------------------------------------------------
    # MinIO public assets — avatars, thumbnails, content/*.
    # MINIO_PUBLIC_BASE_URL in .env.production is configured as
    # https://<domain>/minio/<bucket>, so the browser fetches avatars
    # via https://<domain>/minio/lms-uploads/avatars/<id>.webp. Proxy
    # that path to the MinIO S3 API on port 9000 and strip the /minio
    # prefix so MinIO sees the correct bucket path. Large bodies for
    # video/WebGL streaming — disable nginx buffering + bump timeouts.
    # -------------------------------------------------
    # `^~` tells nginx: once this prefix matches, skip the regex location
    # blocks below (the .webp/.png regex would otherwise win and send the
    # avatar to the frontend upstream, yielding 500).
    location ^~ /minio/ {
      # Strip the /minio/ prefix when forwarding to MinIO.
      rewrite ^/minio/(.*)$ /$1 break;
      proxy_pass http://minio:9000;
      proxy_http_version 1.1;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_buffering         off;
      proxy_request_buffering off;
      client_max_body_size    500m;
      proxy_connect_timeout   60s;
      proxy_read_timeout      300s;
      proxy_send_timeout      300s;
      add_header Cache-Control "public, max-age=604800";
    }

    # -------------------------------------------------
    # Next.js static assets — 1 year immutable cache.
    # -------------------------------------------------
    location /_next/static/ {
      proxy_pass http://frontend_upstream;
      proxy_cache_valid 200 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(?:css|js|woff2?|ttf|eot|otf|ico|jpg|jpeg|png|gif|webp|svg)$ {
      proxy_pass http://frontend_upstream;
      add_header Cache-Control "public, max-age=604800";
    }

    # -------------------------------------------------
    # Everything else → Next.js frontend.
    # -------------------------------------------------
    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";
    }
  }
}
