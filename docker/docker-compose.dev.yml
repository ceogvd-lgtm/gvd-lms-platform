version: '3.9'

# LMS Platform — Dev stack
# Services: postgres, redis, minio (+ createbuckets init)
# Usage: pnpm docker:dev  (or: docker compose -f docker/docker-compose.dev.yml up -d)

services:
  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
      POSTGRES_DB: lms
    ports:
      - '5432:5432'
    volumes:
      - lms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lms -d lms']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lms-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - lms_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lms-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Console
    volumes:
      - lms_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: lms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set lmsminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing lmsminio/lms-uploads;
      /usr/bin/mc anonymous set download lmsminio/lms-uploads;
      exit 0;
      "

  # Phase 17 — ChromaDB for vector embeddings (RAG over lesson PDFs).
  # Gemini text-embedding-004 produces 768-dim vectors which ChromaDB
  # stores + indexes for similarity search. Anonymized telemetry is off
  # so local dev doesn't phone home. Data lives in a named volume so it
  # survives `docker compose down` but can be wiped with `docker volume
  # rm lms_chroma_data` if the embeddings drift from the source docs.
  chromadb:
    image: chromadb/chroma:latest
    container_name: lms-chromadb-dev
    restart: unless-stopped
    ports:
      - '8000:8000'
    volumes:
      - lms_chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: 'false'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/v2/heartbeat']
      interval: 15s
      timeout: 5s
      retries: 5

  # Phase 16 — Mailpit for catching outbound email in local dev.
  # SMTP lands on :1025, the UI on http://localhost:8025. Configure
  # .env with SMTP_HOST=localhost SMTP_PORT=1025 (no auth needed) and
  # every template the app sends is viewable in the browser — Phase
  # 15 certificate flow + at-risk reminders can be eyeballed without
  # needing a real SMTP provider.
  mailpit:
    image: axllent/mailpit:latest
    container_name: lms-mailpit-dev
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8025']
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  lms_postgres_data:
  lms_redis_data:
  lms_minio_data:
  lms_chroma_data:
