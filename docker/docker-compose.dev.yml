version: '3.9'

# LMS Platform — Dev stack
# Services: postgres, redis, minio (+ createbuckets init)
# Usage: pnpm docker:dev  (or: docker compose -f docker/docker-compose.dev.yml up -d)

services:
  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
      POSTGRES_DB: lms
    ports:
      - '5432:5432'
    volumes:
      - lms_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lms -d lms']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lms-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - lms_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: lms-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Console
    volumes:
      - lms_minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5

  createbuckets:
    image: minio/mc:latest
    container_name: lms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set lmsminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing lmsminio/lms-uploads;
      /usr/bin/mc anonymous set download lmsminio/lms-uploads;
      exit 0;
      "

volumes:
  lms_postgres_data:
  lms_redis_data:
  lms_minio_data:
