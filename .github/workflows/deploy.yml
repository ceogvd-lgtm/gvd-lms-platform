name: Deploy

# Phase 18 — production build + image publish.
#
#   push to main             → build + push `latest` tag to GHCR
#   tag v*.*.*               → build + push tagged + deploy to prod
#   workflow_dispatch        → manual trigger (useful after CI flakes)
#
# The actual deploy step is a placeholder: it echoes the image tag so
# you can plug in SSH-to-VPS / Kubernetes / Fly / Render based on your
# target. Replace the `deploy` job body with your mechanism before
# relying on this workflow for real releases.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_tag: ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Resolve version tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta-backend
        name: Backend image metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/backend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,format=short

      - name: Build & push backend (Dockerfile.prod)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - id: meta-frontend
        name: Frontend image metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/frontend
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
            type=sha,format=short

      - name: Build & push frontend (Dockerfile.prod, standalone)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/frontend/Dockerfile.prod
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to production
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Summary
        run: |
          echo "## Deploy plan" >> "$GITHUB_STEP_SUMMARY"
          echo "* version: ${{ needs.build-and-push.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "* backend: ${{ env.IMAGE_BASE }}/backend:${{ needs.build-and-push.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "* frontend: ${{ env.IMAGE_BASE }}/frontend:${{ needs.build-and-push.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
      # TODO — replace with real mechanism. Example for SSH-to-VPS:
      #
      # - uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.PROD_HOST }}
      #     username: ${{ secrets.PROD_USER }}
      #     key: ${{ secrets.PROD_SSH_KEY }}
      #     script: |
      #       cd /srv/lms
      #       export APP_VERSION=${{ needs.build-and-push.outputs.version }}
      #       docker compose -f docker/docker-compose.prod.yml \
      #                      --env-file .env.production pull
      #       docker compose -f docker/docker-compose.prod.yml \
      #                      --env-file .env.production up -d
